version: '3.8'

services:
  # Base de Datos Central (Configuración y Auditoría)
  # Usamos una sola instancia con dos bases de datos para simplificar el MVP
  postgres:
    image: postgres:15-alpine
    container_name: flowjs-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-flowjs_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d # Para crear las DBs al iniciar

  # Bus de Mensajes Interno para Auditoría
  nats:
    image: nats:2.9-alpine
    container_name: flowjs-bus
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222" # Client port
      - "${NATS_MONITOR_PORT:-8222}:8222" # HTTP Monitoring port

  # Audit Logger: consumes NATS audit.logs and persists to PostgreSQL
  audit-logger:
    build:
      context: ./services/audit-logger
      dockerfile: Dockerfile
    container_name: flowjs-audit-logger
    restart: always
    environment:
      - APP_ENV=${APP_ENV:-development}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - POSTGRES_DSN=${POSTGRES_DSN:-host=postgres port=5432 user=admin password=flowjs_pass dbname=flowjs_audit sslmode=disable}
      - HTTP_ADDR=${AUDIT_HTTP_ADDR:-:8080}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${AUDIT_PORT:-8080}:8080"
    depends_on:
      - postgres
      - nats

  # Engine HTTP Server: executes DSL flows sent from the Designer UI
  engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile
    container_name: flowjs-engine
    restart: always
    environment:
      - APP_ENV=${APP_ENV:-development}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:flowjs_pass@postgres:5432/flowjs_config?sslmode=disable}
      - HTTP_ADDR=${ENGINE_HTTP_ADDR:-:9090}
      - SECRETS_AES_KEY=${SECRETS_AES_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${ENGINE_PORT:-9090}:9090"
    depends_on:
      - nats
      - postgres

  # UI de gestión de base de datos (Opcional, muy útil para debug)
  pgadmin:
    image: dpage/pgadmin4
    container_name: flowjs-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-admin@flowjs.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres

  # Designer: React SPA served via nginx
  designer:
    build:
      context: ./apps/designer
      dockerfile: Dockerfile
    container_name: flowjs-designer
    restart: always
    ports:
      - "${DESIGNER_PORT:-5173}:80"
    depends_on:
      - engine
      - audit-logger

  # Orchestrator: per-flow K8s isolation (no-op outside a real cluster)
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: flowjs-orchestrator
    restart: always
    environment:
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - HTTP_ADDR=${ORCHESTRATOR_HTTP_ADDR:-:8081}
      - K8S_NAMESPACE=${K8S_NAMESPACE:-flowjs}
      - ENGINE_IMAGE=${ENGINE_IMAGE:-flowjs-engine:latest}
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:flowjs_pass@postgres:5432/flowjs_config?sslmode=disable}
      - SECRETS_AES_KEY=${SECRETS_AES_KEY}
      - KUBECONFIG_TOKEN=${KUBECONFIG_TOKEN:-}
      - KUBECONFIG_API_SERVER=${KUBECONFIG_API_SERVER:-}
    ports:
      - "${ORCHESTRATOR_PORT:-8081}:8081"
    depends_on:
      - nats

volumes:
  postgres_data:
