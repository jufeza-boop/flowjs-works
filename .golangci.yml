# golangci-lint configuration for flowjs-works
# ADR 0001: CI lint gate — prevents accumulation of code smells.
# https://golangci-lint.run/usage/configuration/
# Requires golangci-lint v2.x (v2 schema)

version: "2"

linters:
  default: none
  enable:
    # Correctness
    - govet          # Reports suspicious constructs found by go vet
    - errcheck       # Checks that error return values are used (ADR rule #1)
    - staticcheck    # Comprehensive static analysis
    # Code quality
    - unconvert      # Removes unnecessary type conversions (ADR #5 / smell #14)
    - gocyclo        # Cyclomatic complexity gate (AGENTS.md: max 10)
    - dupl           # Detects code duplication (ADR smells #1, #3)
    - gocritic       # Opinionated linter with many checks
    - misspell       # Catches common spelling mistakes in comments/strings
    - unused         # Reports unused code
  settings:
    gocyclo:
      # AGENTS.md: cyclomatic complexity must not exceed 10
      min-complexity: 10
    dupl:
      # Flag duplicated blocks of >= 100 tokens
      threshold: 100
    errcheck:
      # Also check errors returned by type-asserted expressions
      check-type-assertions: true

# NOTE: gofmt formatting is enforced by the dedicated lefthook gofmt-* steps
# (gofmt -w), not by golangci-lint. In golangci-lint v2, gofmt is classified
# as a formatter and cannot be listed under linters, so it is omitted here.

issues:
  # Show all issues, not just the first 3 per linter
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Relax errcheck inside test files
    - path: "_test\\.go"
      linters:
        - errcheck
        - dupl
